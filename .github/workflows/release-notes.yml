name: Reusable Release Notes

on:
  workflow_call:
    inputs:
      base_branch:
        description: Primary branch used to collect merged pull requests
        required: false
        default: main
        type: string
      release_boundary:
        description: Explicit release tag or ref used as the lower bound for eligible pull requests
        required: false
        default: ""
        type: string
      category_rules:
        description: JSON object mapping release-note section names to labels
        required: false
        default: >-
          {"Features":["type:feature","feature"],"Fixes":["type:fix","fix","bug"],"Documentation":["type:docs","docs"],"Maintenance":["type:maintenance","maintenance","chore"]}
        type: string
      version_rules:
        description: JSON object mapping semantic version levels to labels
        required: false
        default: >-
          {"major":["release:major","semver:major","breaking"],"minor":["release:minor","semver:minor","feature"],"patch":["release:patch","semver:patch","fix","docs","maintenance","chore"]}
        type: string
      unlabeled_behavior:
        description: Policy for pull requests with no recognized version metadata
        required: false
        default: include_as_patch
        type: string
      revert_handling:
        description: Policy for reverted pull requests
        required: false
        default: exclude_reverted
        type: string
      include_pr_links:
        description: Include pull request links in markdown output
        required: false
        default: true
        type: boolean
      include_authors:
        description: Include author names in markdown output
        required: false
        default: true
        type: boolean
    outputs:
      release_required:
        description: Whether any releasable changes remain after filtering
        value: ${{ jobs.generate.outputs.release_required }}
      version_bump:
        description: Selected semantic version bump
        value: ${{ jobs.generate.outputs.version_bump }}
      next_version:
        description: Next resolved version string
        value: ${{ jobs.generate.outputs.next_version }}
      release_notes_markdown:
        description: Human-readable release notes
        value: ${{ jobs.generate.outputs.release_notes_markdown }}
      release_notes_json:
        description: Structured release note payload
        value: ${{ jobs.generate.outputs.release_notes_json }}
      included_pr_count:
        description: Number of included pull requests
        value: ${{ jobs.generate.outputs.included_pr_count }}
      excluded_prs_with_reasons:
        description: Structured excluded pull request list
        value: ${{ jobs.generate.outputs.excluded_prs_with_reasons }}
      decision_reason:
        description: Human-readable explanation of the release decision
        value: ${{ jobs.generate.outputs.decision_reason }}
  workflow_dispatch:
    inputs:
      base_branch:
        description: Primary branch used to collect merged pull requests
        required: false
        default: main
        type: string
      release_boundary:
        description: Explicit release tag or ref used as the lower bound for eligible pull requests
        required: false
        default: ""
        type: string
      category_rules:
        description: JSON object mapping release-note section names to labels
        required: false
        default: >-
          {"Features":["type:feature","feature"],"Fixes":["type:fix","fix","bug"],"Documentation":["type:docs","docs"],"Maintenance":["type:maintenance","maintenance","chore"]}
        type: string
      version_rules:
        description: JSON object mapping semantic version levels to labels
        required: false
        default: >-
          {"major":["release:major","semver:major","breaking"],"minor":["release:minor","semver:minor","feature"],"patch":["release:patch","semver:patch","fix","docs","maintenance","chore"]}
        type: string
      unlabeled_behavior:
        description: Policy for pull requests with no recognized version metadata
        required: false
        default: include_as_patch
        type: choice
        options:
          - include_as_patch
          - fail
      revert_handling:
        description: Policy for reverted pull requests
        required: false
        default: exclude_reverted
        type: choice
        options:
          - exclude_reverted
          - include_all
      include_pr_links:
        description: Include pull request links in markdown output
        required: false
        default: true
        type: boolean
      include_authors:
        description: Include author names in markdown output
        required: false
        default: true
        type: boolean

  pull_request:
    types: [closed]
    branches:
      - main
permissions:
  contents: write
  pull-requests: read

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      release_required: ${{ steps.evaluate.outputs.release_required }}
      version_bump: ${{ steps.evaluate.outputs.version_bump }}
      next_version: ${{ steps.evaluate.outputs.next_version }}
      release_notes_markdown: ${{ steps.evaluate.outputs.release_notes_markdown }}
      release_notes_json: ${{ steps.evaluate.outputs.release_notes_json }}
      included_pr_count: ${{ steps.evaluate.outputs.included_pr_count }}
      excluded_prs_with_reasons: ${{ steps.evaluate.outputs.excluded_prs_with_reasons }}
      decision_reason: ${{ steps.evaluate.outputs.decision_reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Evaluate merged pull requests and build release notes
        id: evaluate
        uses: actions/github-script@v8
        env:
          WORKFLOW_BASE_BRANCH: ${{ inputs.base_branch }}
          WORKFLOW_RELEASE_BOUNDARY: ${{ inputs.release_boundary }}
          WORKFLOW_CATEGORY_RULES: ${{ inputs.category_rules }}
          WORKFLOW_VERSION_RULES: ${{ inputs.version_rules }}
          WORKFLOW_UNLABELED_BEHAVIOR: ${{ inputs.unlabeled_behavior }}
          WORKFLOW_REVERT_HANDLING: ${{ inputs.revert_handling }}
          DEFAULT_CATEGORY_RULES: >-
            {"Features":["type:feature","feature"],"Fixes":["type:fix","fix","bug"],"Documentation":["type:docs","docs"],"Maintenance":["type:maintenance","maintenance","chore"]}
          DEFAULT_VERSION_RULES: >-
            {"major":["release:major","semver:major","breaking"],"minor":["release:minor","semver:minor","feature"],"patch":["release:patch","semver:patch","fix","docs","maintenance","chore"]}
          WORKFLOW_INCLUDE_PR_LINKS: ${{ inputs.include_pr_links }}
          WORKFLOW_INCLUDE_AUTHORS: ${{ inputs.include_authors }}
        with:
          result-encoding: string
          script: |
            const { execSync } = require("node:child_process");

            // ─── Utilities ──────────────────────────────────────────────────

            function command(text) {
              return execSync(text, { encoding: "utf8", stdio: ["ignore", "pipe", "pipe"] }).trim();
            }

            function readJsonInput(name, fallbackEnv) {
              const raw = process.env[`WORKFLOW_${name.toUpperCase()}`] || process.env[fallbackEnv] || "{}";
              try {
                return JSON.parse(raw);
              } catch (error) {
                throw new Error(`Invalid JSON supplied for ${name}: ${error.message}`);
              }
            }

            // ─── Label / rule matching ───────────────────────────────────────

            function normalizeRuleLabels(value) {
              const list = Array.isArray(value) ? value : Array.isArray(value?.labels) ? value.labels : [];
              return list.map((entry) => String(entry).toLowerCase());
            }

            function matchesRule(labels, ruleValue) {
              return normalizeRuleLabels(ruleValue).some((label) => labels.includes(label));
            }

            // ─── Semver ──────────────────────────────────────────────────────

            function parseVersion(tagName) {
              const match = String(tagName || "").match(/v?(\d+)\.(\d+)\.(\d+)/);
              if (!match) return { major: 0, minor: 0, patch: 0 };
              return { major: Number(match[1]), minor: Number(match[2]), patch: Number(match[3]) };
            }

            function formatVersion({ major, minor, patch }) {
              return `${major}.${minor}.${patch}`;
            }

            function bumpVersion(current, bump) {
              if (bump === "major") return { major: current.major + 1, minor: 0, patch: 0 };
              if (bump === "minor") return { major: current.major, minor: current.minor + 1, patch: 0 };
              if (bump === "patch") return { ...current, patch: current.patch + 1 };
              return { ...current };
            }

            // ─── Git ─────────────────────────────────────────────────────────

            function resolveReleaseBoundary(explicit, baseBranch) {
              if (explicit) return explicit;
              try {
                return command(`git tag --merged origin/${baseBranch} --sort=-creatordate`).split("\n").find(Boolean) || "";
              } catch {
                return "";
              }
            }

            function fetchCommitShas(range) {
              try {
                return command(`git log --pretty=%H%x1e ${range}`)
                  .split("\x1e")
                  .map((sha) => sha.trim())
                  .filter(Boolean)
                  .reverse();
              } catch {
                return [];
              }
            }

            // ─── GitHub API ──────────────────────────────────────────────────

            async function fetchMergedPRs(owner, repo, baseBranch, shas) {
              const prMap = new Map();
              for (const sha of shas) {
                const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
                for (const pr of data) {
                  if (pr.base?.ref === baseBranch && pr.merged_at) {
                    prMap.set(pr.number, pr);
                  }
                }
              }
              return prMap;
            }

            // ─── Revert detection ────────────────────────────────────────────

            function detectReverts(pullRequests, prMap) {
              const revertedNumbers = new Set();
              const revertPrNumbers = new Set();
              for (const pr of pullRequests) {
                if (!/^revert\b/i.test(pr.title)) continue;
                const referenced = [...`${pr.title}\n${pr.body || ""}`.matchAll(/#(\d+)/g)]
                  .map((m) => Number(m[1]))
                  .filter((n) => prMap.has(n));
                if (referenced.length === 0) continue;
                revertPrNumbers.add(pr.number);
                for (const n of referenced) revertedNumbers.add(n);
              }
              return { revertedNumbers, revertPrNumbers };
            }

            // ─── PR classification ───────────────────────────────────────────

            function classifyPRs(pullRequests, { revertedNumbers, revertPrNumbers, revertHandling, categoryEntries, versionEntries, unlabeledBehavior, precedence }) {
              const included = [];
              const excluded = [];
              const fatalMessages = [];
              let highestImpact = "none";

              for (const pr of pullRequests) {
                if (revertHandling === "exclude_reverted" && (revertedNumbers.has(pr.number) || revertPrNumbers.has(pr.number))) {
                  excluded.push({ number: pr.number, reason: "reverted_before_release" });
                  continue;
                }

                const labels = (pr.labels || []).map((label) => String(label.name || "").toLowerCase());

                let category = "Other Changes";
                for (const [sectionName, ruleValue] of categoryEntries) {
                  if (matchesRule(labels, ruleValue)) { category = sectionName; break; }
                }

                const matchedLevels = versionEntries
                  .filter(([level, ruleValue]) => precedence[level] && matchesRule(labels, ruleValue))
                  .map(([level]) => level);

                if (matchedLevels.length > 1) {
                  fatalMessages.push(`Pull request #${pr.number} has conflicting semantic version labels: ${matchedLevels.join(", ")}`);
                  excluded.push({ number: pr.number, reason: "conflicting_version_metadata" });
                  continue;
                }

                let versionImpact = matchedLevels[0] || "unspecified";
                if (versionImpact === "unspecified") {
                  if (unlabeledBehavior === "fail") {
                    fatalMessages.push(`Pull request #${pr.number} does not contain recognized semantic version metadata`);
                    excluded.push({ number: pr.number, reason: "missing_version_metadata" });
                    continue;
                  }
                  versionImpact = "patch";
                }

                if (precedence[versionImpact] > precedence[highestImpact]) highestImpact = versionImpact;
                included.push({ number: pr.number, title: pr.title, url: pr.html_url, author: pr.user?.login ?? "unknown", category, versionImpact, mergedAt: pr.merged_at });
              }

              if (fatalMessages.length > 0) throw new Error(fatalMessages.join("\n"));
              return { included, excluded, highestImpact };
            }

            // ─── Report building ─────────────────────────────────────────────

            function buildReport(included, { categoryEntries, includePrLinks, includeAuthors }) {
              const groupedSections = new Map([...categoryEntries.map(([name]) => [name, []]), ["Other Changes", []]]);
              for (const item of included) {
                if (!groupedSections.has(item.category)) groupedSections.set(item.category, []);
                groupedSections.get(item.category).push(item);
              }

              const sectionPayload = [];
              const markdownLines = [];
              for (const [sectionName, entries] of groupedSections.entries()) {
                if (!entries.length) continue;
                sectionPayload.push({
                  section_name: sectionName,
                  entries: entries.map(({ number, title, url, author, versionImpact }) => ({ number, title, url, author, version_impact: versionImpact })),
                });
                markdownLines.push(`## ${sectionName}`);
                for (const entry of entries) {
                  const suffix = [includePrLinks ? `[#${entry.number}](${entry.url})` : `#${entry.number}`];
                  if (includeAuthors) suffix.push(`by @${entry.author}`);
                  markdownLines.push(`- ${entry.title} (${suffix.join(", ")})`);
                }
                markdownLines.push("");
              }
              return { sectionPayload, markdownLines };
            }

            // ─── Output emission ─────────────────────────────────────────────

            function emitOutputs({ releaseRequired, highestImpact, nextVersion, releaseNotesMarkdown, releaseNotesJson, included, excluded }) {
              core.setOutput("release_required", releaseRequired ? "true" : "false");
              core.setOutput("version_bump", releaseRequired ? highestImpact : "none");
              core.setOutput("next_version", nextVersion);
              core.setOutput("release_notes_markdown", releaseNotesMarkdown);
              core.setOutput("release_notes_json", releaseNotesJson);
              core.setOutput("included_pr_count", String(included.length));
              core.setOutput("excluded_prs_with_reasons", JSON.stringify(excluded));
              core.setOutput("decision_reason", releaseRequired
                ? `Selected ${highestImpact} because the highest-impact eligible pull request requires that bump.`
                : "No releasable changes were found after the current release boundary.");

              core.startGroup("Release notes outputs");
              core.info(`release_required=${releaseRequired ? "true" : "false"}`);
              core.info(`version_bump=${releaseRequired ? highestImpact : "none"}`);
              core.info(`next_version=${nextVersion}`);
              core.info(`release_notes_markdown=${releaseNotesMarkdown}`);
              core.info(`release_notes_json=${releaseNotesJson}`);
              core.info(`included_pr_count=${String(included.length)}`);
              core.info(`excluded_prs_with_reasons=${JSON.stringify(excluded)}`);
              core.endGroup();
            }

            // ─── Main ─────────────────────────────────────────────────────────

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const baseBranch = process.env.WORKFLOW_BASE_BRANCH || "main";
            const includePrLinks = String(process.env.WORKFLOW_INCLUDE_PR_LINKS ?? "true").toLowerCase() === "true";
            const includeAuthors = String(process.env.WORKFLOW_INCLUDE_AUTHORS ?? "true").toLowerCase() === "true";
            const unlabeledBehavior = process.env.WORKFLOW_UNLABELED_BEHAVIOR || "include_as_patch";
            const revertHandling = process.env.WORKFLOW_REVERT_HANDLING || "exclude_reverted";
            const categoryRules = readJsonInput("category_rules", "DEFAULT_CATEGORY_RULES");
            const versionRules = readJsonInput("version_rules", "DEFAULT_VERSION_RULES");
            const categoryEntries = Object.entries(categoryRules);
            const versionEntries = Object.entries(versionRules);
            const precedence = { none: 0, patch: 1, minor: 2, major: 3 };

            command("git fetch --tags --force");
            command(`git fetch origin ${baseBranch} --depth=1`);

            const releaseBoundary = resolveReleaseBoundary((process.env.WORKFLOW_RELEASE_BOUNDARY || "").trim(), baseBranch);
            const range = releaseBoundary ? `${releaseBoundary}..origin/${baseBranch}` : `origin/${baseBranch}`;
            const shas = fetchCommitShas(range);
            const prMap = await fetchMergedPRs(owner, repo, baseBranch, shas);
            const pullRequests = Array.from(prMap.values()).sort((a, b) => new Date(a.merged_at) - new Date(b.merged_at));

            const { revertedNumbers, revertPrNumbers } = detectReverts(pullRequests, prMap);
            const { included, excluded, highestImpact } = classifyPRs(pullRequests, { revertedNumbers, revertPrNumbers, revertHandling, categoryEntries, versionEntries, unlabeledBehavior, precedence });
            const { sectionPayload, markdownLines } = buildReport(included, { categoryEntries, includePrLinks, includeAuthors });

            const releaseRequired = included.length > 0;
            const nextVersion = releaseRequired ? formatVersion(bumpVersion(parseVersion(releaseBoundary), highestImpact)) : "";
            const releaseNotesMarkdown = releaseRequired ? markdownLines.join("\n").trim() : "No releasable changes.";
            const releaseNotesJson = JSON.stringify({
              base_branch: baseBranch,
              release_boundary: releaseBoundary,
              release_required: releaseRequired,
              version_bump: releaseRequired ? highestImpact : "none",
              next_version: nextVersion,
              sections: sectionPayload,
            });

            emitOutputs({ releaseRequired, highestImpact, nextVersion, releaseNotesMarkdown, releaseNotesJson, included, excluded });
            return releaseNotesMarkdown;

  publish:
    needs: generate
    if: needs.generate.outputs.release_required == 'true' && github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: Create release tag and GitHub Release
        uses: actions/github-script@v8
        env:
          NEXT_VERSION: ${{ needs.generate.outputs.next_version }}
          RELEASE_NOTES_MARKDOWN: ${{ needs.generate.outputs.release_notes_markdown }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const nextVersion = (process.env.NEXT_VERSION || "").trim();
            const releaseNotesMarkdown = process.env.RELEASE_NOTES_MARKDOWN || "";

            if (!nextVersion) {
              throw new Error("NEXT_VERSION output is empty while release_required=true.");
            }

            const tagName = `v${nextVersion}`;

            // Avoid duplicate failures when a prior run already published this version.
            let tagExists = false;
            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tagName}`,
              });
              tagExists = true;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (!tagExists) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha,
              });
            }

            const releaseName = tagName;
            const releaseBody = releaseNotesMarkdown || "No release notes generated.";

            try {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                generate_release_notes: false,
              });
              core.info(`Created release ${tagName}.`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Release ${tagName} already exists. Skipping creation.`);
              } else {
                throw error;
              }
            }
