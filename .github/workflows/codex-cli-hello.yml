name: Codex CLI Hello

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt sent to Codex CLI
        required: false
        default: Say hello
        type: string

permissions:
  contents: read

jobs:
  codex-hello:
    runs-on: self-hosted
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Codex CLI without API key requirement
        env:
          CODEX_PROMPT: ${{ github.event.inputs.prompt || 'Say hello' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Attempting: codex exec \"$CODEX_PROMPT\""
          codex "$CODEX_PROMPT"; then
            echo "Codex CLI executed successfully."
          else
            echo "Codex CLI execution failed. Please ensure the Codex CLI is installed and configured correctly."
            exit 1
          fi
