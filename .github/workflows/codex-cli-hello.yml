name: Codex CLI Hello

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt sent to Codex CLI
        required: false
        default: /prompts.speckit.implement 004 do not ask question and decide yourself session should be non-interactive and commands are allowed
        type: string

permissions:
  contents: read

jobs:
  codex-hello:
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Codex CLI is available on runner
        shell: bash
        run: |
          set -euo pipefail

          export CODEX_HOME="$PWD/.codex"
          if [ ! -d "$CODEX_HOME" ]; then
            echo "Repo-local CODEX_HOME not found: $CODEX_HOME"
            echo "Add .codex to this repository checkout. Home fallback is disabled."
            exit 1
          fi
          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"

          if command -v codex >/dev/null 2>&1; then
            :
          elif [ -x /opt/homebrew/bin/codex ]; then
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          elif [ -x /usr/local/bin/codex ]; then
            echo "/usr/local/bin" >> "$GITHUB_PATH"
          else
            echo "Codex CLI not found for runner user: $(whoami)"
            echo "Install Codex for this user, or add its bin directory to PATH for the runner service."
            exit 1
          fi

          echo "Runner user: $(whoami)"
          echo "PATH: $PATH"
          echo "CODEX_HOME: $CODEX_HOME"
          which codex
          codex --version

      - name: Run Codex CLI without API key requirement
        env:
          CODEX_PROMPT: ${{ github.event.inputs.prompt || 'Say hello' }}
        shell: bash
        run: |
          set -euo pipefail
          export CODEX_HOME="$PWD/.codex"
          if [ ! -d "$CODEX_HOME" ]; then
            echo "Repo-local CODEX_HOME not found: $CODEX_HOME"
            echo "Add .codex to this repository checkout. Home fallback is disabled."
            exit 1
          fi
          normalized_prompt="$CODEX_PROMPT"
          echo "Workflow input prompt: $CODEX_PROMPT"
          echo "Resolved prompt: $normalized_prompt"
          echo "Using CODEX_HOME: $CODEX_HOME"

          if [[ "$normalized_prompt" != /prompts.* ]]; then
            echo "Invalid prompt format: $normalized_prompt"
            echo "Use /prompts.<name> format, for example: /prompts.speckit.implement 007"
            exit 1
          fi

          if [[ "$normalized_prompt" == /prompts.speckit.* ]]; then
            prompt_name="${normalized_prompt#/prompts.}"
            prompt_name="${prompt_name%% *}"
            prompt_file="$CODEX_HOME/prompts/${prompt_name}.md"

            if [ ! -f "$prompt_file" ]; then
              echo "Missing Spec Kit prompt: $prompt_file"
              echo "Current CODEX_HOME: $CODEX_HOME"
              exit 1
            fi
          fi

          if [ -t 0 ] && [ -t 1 ]; then
            codex_cmd=(codex "$normalized_prompt")
          else
            codex_cmd=(codex exec --skip-git-repo-check "$normalized_prompt")
          fi

          echo "Codex command: ${codex_cmd[*]}"
          set +e
          codex_output="$("${codex_cmd[@]}" 2>&1)"
          codex_status=$?
          set -e

          if [ "$codex_status" -eq 0 ]; then
            echo "Codex CLI executed successfully."
            echo "Codex CLI response:"
            echo "$codex_output"
          else
            echo "Codex CLI execution failed. Please ensure the Codex CLI is installed and configured correctly."
            echo "Exact error from Codex CLI:"
            echo "$codex_output"
            exit "$codex_status"
          fi
