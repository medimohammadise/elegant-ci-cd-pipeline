name: Codex CLI Hello

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt sent to Codex CLI
        required: false
        default: Say hello
        type: string

permissions:
  contents: read

jobs:
  codex-hello:
    runs-on: self-hosted
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Codex CLI without API key requirement
        env:
          CODEX_PROMPT: ${{ github.event.inputs.prompt || 'Say hello' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Attempting: codex \"$CODEX_PROMPT\""
          set +e
          codex_output="$(codex "$CODEX_PROMPT" 2>&1)"
          codex_status=$?
          set -e

          if [ "$codex_status" -eq 0 ]; then
            echo "Codex CLI executed successfully."
          else
            echo "Codex CLI execution failed. Please ensure the Codex CLI is installed and configured correctly."
            echo "Exact error from Codex CLI:"
            echo "$codex_output"
            exit "$codex_status"
          fi
