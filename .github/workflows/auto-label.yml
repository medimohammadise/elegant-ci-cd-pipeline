name: Auto-Label Pull Requests

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number to label (caller should pass this for workflow_call executions)'
        required: false
        type: number
      repository:
        description: 'Optional owner/repo string; falls back to the current repo'
        required: false
        default: ''
        type: string
      labels_config_path:
        description: 'Path to the label definition manifest in the target repo'
        required: false
        default: '.github/labels.yml'
        type: string


  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Apply labels based on changed files and PR metadata
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_LABELS_CONFIG: ${{ inputs.labels_config_path }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          LABELS_CONFIG="${INPUT_LABELS_CONFIG:-.github/labels.yml}"
          PR_NUMBER="${INPUT_PR_NUMBER:-}"
          REPO="${INPUT_REPOSITORY:-}"

          if [[ -z "$PR_NUMBER" ]]; then
            PR_NUMBER="${EVENT_PR_NUMBER:-}"
          fi

          if [[ -z "$REPO" ]]; then
            REPO="${EVENT_REPOSITORY:-}"
          fi

          if [[ -z "$PR_NUMBER" ]]; then
            echo "Pull request number must be provided either via workflow_call inputs or the workflow event" >&2
            exit 1
          fi

          if [[ -z "$REPO" ]]; then
            echo "Repository must be inferable from workflow_call inputs or the workflow event" >&2
            exit 1
          fi

          # ----------------------------------------------------------------
          # Parse labels.yml into a JSON array for easy shell consumption
          # ----------------------------------------------------------------
          if [[ ! -f "$LABELS_CONFIG" ]]; then
            echo "Labels config not found at $LABELS_CONFIG" >&2
            exit 1
          fi

          labels_json=$(python3 - "$LABELS_CONFIG" <<'PY'
          import json
          import sys
          import yaml
          
          path = sys.argv[1]
          data = yaml.safe_load(open(path)) or {}
          print(json.dumps(data.get('labels', [])))
          PY
          )

          # ----------------------------------------------------------------
          # Helper: ensure a label exists in the repo (create if absent)
          # ----------------------------------------------------------------
          ensure_label() {
            local name="$1" color="$2" description="$3"
            if ! gh label list --repo "$REPO" --json name --jq '.[].name' \
                | grep -qxF "$name"; then
              gh label create "$name" \
                --repo "$REPO" \
                --color "${color#\#}" \
                --description "$description" || true
            fi
          }

          # ----------------------------------------------------------------
          # Create all managed labels from labels.yml (if they don't exist)
          # ----------------------------------------------------------------
          while IFS= read -r entry; do
            name=$(echo "$entry"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['name'])")
            color=$(echo "$entry" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['color'])")
            desc=$(echo "$entry"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('description',''))")
            ensure_label "$name" "$color" "$desc"
          done < <(echo "$labels_json" | python3 -c $'import sys, json\nfor item in json.load(sys.stdin):\n    print(json.dumps(item))')

          # ----------------------------------------------------------------
          # Collect changed files in this PR
          # ----------------------------------------------------------------
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body')
          PR_HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName --jq '.headRefName')

          changed_files=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json files --jq '.files[].path')

          echo "Changed files:"
          echo "$changed_files"

          combined_title_branch="${PR_TITLE,,} ${PR_HEAD_BRANCH,,}"
          combined_body="${PR_TITLE} ${PR_BODY:-}"

          labels_to_apply=()

          # ----------------------------------------------------------------
          # Match each label's patterns against PR data (read from labels.yml)
          # ----------------------------------------------------------------
          while IFS= read -r entry; do
            label_name=$(echo "$entry" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['name'])")
            matched=false

            # file_patterns: match against changed file paths
            while IFS= read -r pattern; do
              [[ -z "$pattern" ]] && continue
              if echo "$changed_files" | grep -qE "$pattern"; then
                matched=true
                break
              fi
            done < <(echo "$entry" | python3 -c $'import sys, json\nd = json.load(sys.stdin)\nfor p in d.get("file_patterns", []):\n    print(p)')

            # title_patterns: match against lowercased PR title + branch
            if ! $matched; then
              while IFS= read -r pattern; do
                [[ -z "$pattern" ]] && continue
                if echo "$combined_title_branch" | grep -qE "$pattern"; then
                  matched=true
                  break
                fi
              done < <(echo "$entry" | python3 -c $'import sys, json\nd = json.load(sys.stdin)\nfor p in d.get("title_patterns", []):\n    print(p)')

            fi

            # body_patterns: match against PR title + body (case-sensitive)
            if ! $matched; then
              while IFS= read -r pattern; do
                [[ -z "$pattern" ]] && continue
                if echo "$combined_body" | grep -qE "$pattern"; then
                  matched=true
                  break
                fi
              done < <(echo "$entry" | python3 -c $'import sys, json\nd = json.load(sys.stdin)\nfor p in d.get("body_patterns", []):\n    print(p)')

            fi

            if $matched; then
              labels_to_apply+=("$label_name")
            fi
          done < <(echo "$labels_json" | python3 -c $'import sys, json\nfor item in json.load(sys.stdin):\n    print(json.dumps(item))')

          # ----------------------------------------------------------------
          # Apply all collected labels (deduplicated)
          # ----------------------------------------------------------------
          if [[ ${#labels_to_apply[@]} -eq 0 ]]; then
            echo "No labels to apply."
            exit 0
          fi

          unique_labels=$(printf '%s\n' "${labels_to_apply[@]}" | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Applying labels: $unique_labels"

          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$unique_labels"
